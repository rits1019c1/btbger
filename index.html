<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- OGP Tags -->
    <meta property="og:title" content="THE PROJECT - 実装可能な狂気">
    <meta property="og:description" content="思考を刺激する、実行可能な狂気的プロジェクト・ジェネレーター。">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <title>THE PROJECT - 実装可能な狂気</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&family=Noto+Sans+JP:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            color: #000000;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .idea-display {
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-action {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-action::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-action:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        .dot {
            width: 6px;
            height: 6px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            vertical-align: middle;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">

    <nav class="fixed top-0 left-0 w-full p-8 flex justify-between items-end">
        <div>
            <h1 class="text-xs font-black tracking-[0.3em] uppercase">The Prototype Lab</h1>
        </div>
        <div class="text-[10px] opacity-40 text-right uppercase tracking-[0.2em]">
            Status: Ready to Execute<br>
            Version: 4.2.0
        </div>
    </nav>

    <main class="w-full max-w-5xl">
        <div id="idea-card" class="idea-display opacity-0 translate-y-8">
            <div class="mb-4">
                <span class="text-[10px] font-bold tracking-[0.4em] text-gray-400 uppercase">Operational Brief</span>
            </div>
            
            <div id="idea-content" class="text-4xl md:text-7xl font-black leading-[1.15] tracking-tighter mb-20">
                <!-- 生成されたテキスト -->
            </div>
            
            <div class="flex flex-col md:flex-row gap-12 items-start md:items-center">
                <button id="generate-btn" class="group text-sm font-bold tracking-[0.2em] flex items-center gap-4">
                    <span class="bg-black text-white px-8 py-5 group-hover:bg-gray-800 transition-colors">NEXT CONCEPT</span>
                    <span class="btn-action py-4 border-b border-transparent">REGENERATE</span>
                </button>
                
                <button id="copy-btn" class="text-[10px] font-black tracking-[0.3em] opacity-30 hover:opacity-100 transition-opacity uppercase">
                    Copy to Clipboard
                </button>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full p-8 flex justify-between items-center text-[9px] tracking-[0.3em] text-gray-300 uppercase">
        <div>Proprietary Algorithm v4.2</div>
        <div>No Rights Reserved.</div>
    </footer>

    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-black text-white text-[10px] px-6 py-3 tracking-[0.2em] opacity-0 transition-all duration-500 pointer-events-none uppercase">
        Brief copied to clipboard
    </div>

    <script>
    /**

 */

const adjectives = [

  "感情を読み取る", "常に震えている", "液体にならない", "デジタルな",
  "課金制の", "匿名性の高い", "物理演算を無視した", "完全に無音の",
  "光速で移動する", "土に還る", "1000年使い続けられる", "匂いだけの",
  "触れると温度が変わる", "視線で操作する", "夢の中でしか使えない",
  "自己増殖する", "倫理観が欠如した", "幸福度を強制する", "問い53%の",
  "53が空いてないビンゴの", "最適化され", "存在感の希薄な", "固定エメラルドの",
  "OSのアップグレードのような", "昨日はできて今日はできない",
  
  // --- 拡張リスト ---
  "他人の記憶でできた", "常にアップデート中な", "解像度が低すぎる", "クリックできない",
  "誰も見ていない時だけ動く", "ログインが必要な", "3回使うと呪われる", "フォントが明朝体すぎる",
  "誰の許可も得ていない", "重力の設定を間違えた", "絶対に目が合わない", "親の顔より見た",
  "検索しても出てこない", "利用規約に3万文字かかる", "1ビットの", "バグを取り忘れた",
  "物理的に不可能な角度の", "夢の出口に置いてある", "意味がわかると怖い", "通知が止まらない",
  "誰からも愛されない", "自分の意志を持っている", "賞味期限がマイナスの", "昨日までここになかった",
  "概念だけの", "1%の確率で爆発する", "嘘をつくのが下手な", "503 Service Unavailableな",
  "自分を人間だと思い込んでいる", "一度も開けられたことがない", "名前を呼んではいけない",

const objects = [
  // --- 元のリスト ---
  "ジュース", "竹馬", "枕", "おにぎり", "サウナ", "SNS", "履歴書",

  "サングラス", "パスワード", "鏡", "ネクタイ", "会議室", "公園",
  "T.S", "ArtistR", "りんご", "生命", "狼", "充電器", "タブレットコンピューター",
  "ぶっ飛んだ何か", "瞬き", "錦蛇", "言語", "ビンゴ", "ポテトサラダ", "服",
  "ドア", "開いてるふりをするドア", "閉じてるふりをするドア",
  
  // --- 拡張リスト ---
  "通知センター", "昨日の晩ごはんの記憶", "利用規約", "エスカレーターのベルト",
  "未読スルー", "透明人間", "タイムマシン（片道）", "親指", "検索履歴",
  "お辞儀", "宇宙の終わり", "影", "ボタン", "沈黙", "パスワードの伏せ字（***）",
  "空気を読む力", "1ドットの点", "存在しないはずの駅", "他人の不幸", "自分自身",
  "ゴミ箱（デスクトップの）", "誰かの忘れ物", "心臓の音", "Wi-Fiの電波", "言い訳",
  "あくび", "404エラー", "深夜2時のテンション", "人類の共通言語", "誰も座らない椅子",
  "鏡に映らない自分", "読みかけの遺書", "空のフォルダ", "意味のない会議", "猫の集会",
  "100万回生きた猫の抜け殻", "タイムラインの濁流"
];

const verbs = [
  // --- 元のリスト ---
  "を作る", "をサブスク化する", "を展示する", "を法制化する",
  "を販売する", "をプロデュースする", "をデコレーションする",
  "を冷凍保存する", "を再定義する", "を配布する", "を自動生成する",
  "を競技化する", "を義務付ける", "を爆破する", "をNFTとして売る",
  "をAIに学習させる", "を無人島で流行らせる", "を宇宙へ射出する",
  "をアイドルにする", "ルを楽器にする", "を通貨にする", "を埋蔵する",
  "を食べる", "を大喜利の解答として出力する", "を18文字（!anbyam）で記述する", "を歴史から消去する",
  
  // --- 拡張リスト ---
  "を神格化する", "をブロックする", "を無理やり言語化する", "をクラウドファンディングで募る",
  "をなかったことにする", "を暗号化して埋める", "をルーチンワークにする", "を2倍速で再生する",
  "を履歴から消去する", "を義務教育に取り入れる", "を宗教にする", "を可視化して絶望する",
  "をガチャの景品にする", "をAIと結婚させる", "を無理やりバズらせる", "を逆再生する",
  "を誰かのせいににする", "を世界遺産に登録申請する", "を圧縮して保存する", "をデバッグし続ける",
  "を100均で販売する", "を強制終了させる", "を自分へのご褒美にする", "を深層心理に隠す",
  "を丁寧語に翻訳する", "を対義語で置き換える", "を実写化する", "を煮込んでスープにする",
  "をNFTとして売り捌く", "を左右反転させて使う", "をプログラミングコードに変換する",
  "を一生呪い続ける", "をメルカリに出品する", "を遺影として飾る"
];


        const ideaCard = document.getElementById('idea-card');
        const ideaContent = document.getElementById('idea-content');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');

        function generate() {
            ideaCard.style.opacity = '0';
            ideaCard.style.transform = 'translateY(10px)';

            setTimeout(() => {
                const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
                const obj = objects[Math.floor(Math.random() * objects.length)];
                const v = verbs[Math.floor(Math.random() * verbs.length)];
                
                ideaContent.innerHTML = `<span class="dot"></span>${adj}${obj}${v}`;
                
                ideaCard.style.opacity = '1';
                ideaCard.style.transform = 'translateY(0)';
            }, 400);
        }

        function showToast() {
            toast.style.opacity = 1;
            toast.style.top = "48px";
            setTimeout(() => {
                toast.style.opacity = 0;
                toast.style.top = "40px";
            }, 1500);
        }

        generateBtn.addEventListener('click', generate);

        copyBtn.addEventListener('click', () => {
            const text = ideaContent.innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast();
        });

        window.onload = generate;
    </script>
</body>
</html>
